<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTM · BLKPVNTHR Admin</title>

    <link rel="stylesheet" href="styles.css?v=4" />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css"
    />

    <style>
      .ttm-accordion {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .ttm-item {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.18);
      }

      .ttm-item summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        cursor: pointer;
        list-style: none;
        user-select: none;
      }

      .ttm-item summary::-webkit-details-marker {
        display: none;
      }

      .ttm-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .ttm-month {
        font-weight: 900;
      }

      .ttm-meta {
        color: var(--muted);
        font-size: 12px;
      }

      .ttm-right {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .ttm-total {
        font-weight: 900;
      }

      .ttm-body {
        padding: 12px 14px 14px;
        border-top: 1px dashed rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.1);
      }

      .ttm-kpis {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 10px;
      }

      .ttm-kpi {
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.18);
      }

      .ttm-kpi .label {
        color: var(--muted);
        font-size: 12px;
      }

      .ttm-kpi .val {
        margin-top: 4px;
        font-size: 16px;
        font-weight: 900;
        font-variant-numeric: tabular-nums;
      }

      .ttm-table-wrap {
        width: 100%;
        overflow-x: auto;
      }

      @media (max-width: 900px) {
        .ttm-kpis {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar-placeholder"></div>

    <!-- APP -->
    <div id="app" class="container" aria-hidden="false">
      <header class="header">
        <div>
          <h1>TTM</h1>
          <p class="muted">Accordion by month — click to expand income for that month.</p>
        </div>

        <div class="header-actions">
          <button id="logoutBtn" class="btn ghost" type="button">Lock</button>
        </div>
      </header>

      <section class="card">
        <h2>Months</h2>
        <div id="ttmAccordion" class="ttm-accordion"></div>
        <p class="tiny muted" style="margin-top: 10px;">
          Tip: Click a month row to expand. Tables load on-demand.
        </p>
      </section>
    </div>

    <!-- LIBS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- SUPABASE INIT -->
    <script>
      const SUPABASE_URL = "https://xtespuzbuepublmiciyf.supabase.co";
      const SUPABASE_KEY = "sb_publishable_giqkrVUBnF8PS-7sWS_WaQ_2lk-8wOL";

      window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      console.log("✅ Supabase initialized:", SUPABASE_URL);
    </script>

    <!-- MAGIC LINK RETURN HANDLING -->
    <script>
      (async () => {
        try {
          const url = new URL(window.location.href);
          const code = url.searchParams.get("code");

          if (code) {
            const { error } = await window.sb.auth.exchangeCodeForSession(
              window.location.href
            );
            if (error) console.error("exchangeCodeForSession error:", error);

            url.searchParams.delete("code");
            history.replaceState({}, document.title, url.toString());
            return;
          }

          if (window.location.hash.includes("access_token")) {
            await window.sb.auth.getSession();
            history.replaceState({}, document.title, window.location.pathname);
          }
        } catch (e) {
          console.error("Magic link handling failed:", e);
        }
      })();
    </script>

    <!-- AUTH GUARD -->
    <script>
      async function requireSession() {
        try {
          const { data, error } = await window.sb.auth.getSession();

          if (error || !data?.session) {
            window.location.href = "/login.html";
            return false;
          }

          window.currentUser = data.session.user;
          return true;
        } catch (e) {
          console.error("Session guard failed:", e);
          window.location.href = "/login.html";
          return false;
        }
      }
    </script>

    <!-- NAV -->
    <script>
      function initSiteNav() {
        const siteNav = document.getElementById("siteNav");
        if (!siteNav || siteNav.dataset.bound === "1") return;
        siteNav.dataset.bound = "1";

        const navToggle = document.getElementById("navToggle");
        const navMenu = document.getElementById("navMenu");

        navToggle?.addEventListener("click", () => {
          const isOpen = navMenu.classList.toggle("open");
          navToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        siteNav.addEventListener("click", async (e) => {
          const ddToggle = e.target.closest(".nav-dd__toggle");
          const logoutBtn = e.target.closest("#logoutBtn");

          if (ddToggle) {
            e.preventDefault();
            e.stopPropagation();

            const parent = ddToggle.closest(".nav-dd");
            const isOpen = parent.classList.contains("open");

            siteNav.querySelectorAll(".nav-dd.open").forEach((item) => {
              if (item !== parent) {
                item.classList.remove("open");
                item
                  .querySelector(".nav-dd__toggle")
                  ?.setAttribute("aria-expanded", "false");
              }
            });

            parent.classList.toggle("open", !isOpen);
            ddToggle.setAttribute("aria-expanded", !isOpen ? "true" : "false");
            return;
          }

          if (logoutBtn) {
            e.preventDefault();
            logoutBtn.disabled = true;

            try {
              await window.sb.auth.signOut();
              window.location.href = "/login.html";
            } catch (err) {
              console.error("Logout failed:", err);
              logoutBtn.disabled = false;
            }
          }
        });

        document.addEventListener("click", (e) => {
          if (!siteNav.contains(e.target)) {
            siteNav.querySelectorAll(".nav-dd.open").forEach((item) => {
              item.classList.remove("open");
              item
                .querySelector(".nav-dd__toggle")
                ?.setAttribute("aria-expanded", "false");
            });
          }
        });

        document.addEventListener("keydown", (e) => {
          if (e.key !== "Escape") return;

          siteNav.querySelectorAll(".nav-dd.open").forEach((item) => {
            item.classList.remove("open");
            item
              .querySelector(".nav-dd__toggle")
              ?.setAttribute("aria-expanded", "false");
          });
        });
      }

      async function loadNavbar() {
        const host = document.getElementById("navbar-placeholder");
        if (!host) return;

        const candidates = [
          "/navbar.html",
          "navbar.html",
          "./navbar.html",
          "partials/navbar.html",
          "./partials/navbar.html"
        ];

        for (const url of candidates) {
          try {
            const r = await fetch(url, { cache: "no-store" });
            if (!r.ok) continue;

            host.innerHTML = await r.text();
            initSiteNav();
            return;
          } catch (e) {}
        }

        host.innerHTML = `
          <div style="padding:10px 14px;color:#aaa;">
            Navbar not found
          </div>
        `;
      }
    </script>

    <!-- PAGE BOOT -->
    <script>
      (async () => {
        const ok = await requireSession();
        if (!ok) return;

        await loadNavbar();

        const headerLogout = document.getElementById("logoutBtn");
        headerLogout?.addEventListener("click", async () => {
          headerLogout.disabled = true;
          try {
            await window.sb.auth.signOut();
            window.location.href = "/login.html";
          } catch (e) {
            console.error("Header logout failed:", e);
            headerLogout.disabled = false;
          }
        });
      })();
    </script>

    <!-- APP -->
    <script src="app.js"></script>
  </body>
</html>
